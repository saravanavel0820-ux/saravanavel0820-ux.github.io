<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renewable Energy Monitoring System for Microgrids</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #eab308;
            --text: #f8fafc;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: var(--accent); text-align: center; margin-bottom: 10px; }
        
        /* New Styles for Navigation Button */
        .nav-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .nav-btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .nav-btn:hover {
            background: #2563eb;
        }
        .nav-btn:active {
            transform: scale(0.98);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 30px;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border-bottom: 4px solid var(--accent);
        }
        .card h3 { margin: 0 0 10px 0; color: #94a3b8; }
        .card p { margin: 0; font-size: 2rem; font-weight: bold; }
        
        .chat-container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 400px;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg { padding: 10px 14px; border-radius: 8px; max-width: 75%; }
        .user { background: #3b82f6; align-self: flex-end; }
        .ai { background: #334155; align-self: flex-start; }
        
        .input-area {
            display: flex;
            border-top: 1px solid #334155;
        }
        .input-area input {
            flex: 1;
            padding: 15px;
            border: none;
            background: #0f172a;
            color: white;
            outline: none;
        }
        .input-area button {
            padding: 0 25px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Renewable Energy Monitoring System for Microgrids</h1>
    
    <!-- Navigation Container with Automation Link -->
    <div class="nav-container">
        <a href="automation.html" class="nav-btn">Go to Automation Panel →</a>
    </div>
    
    <!-- Dashboard Cards -->
    <div class="grid">
        <div class="card">
            <h3>Voltage</h3>
            <p id="volt">0.0 V</p>
        </div>
        <div class="card">
            <h3>Current</h3>
            <p id="curr">0.0 A</p>
        </div>
        <div class="card">
            <h3>Power Output</h3>
            <p id="power">0.0 W</p>
        </div>
        <div class="card">
            <h3>Battery Status</h3>
            <p id="status" style="font-size: 1.5rem;">Connecting...</p>
        </div>
    </div>

    <!-- AI Chat Interface -->
    <h2>AI Microgrid Assistant</h2>
    <div class="chat-container">
        <div class="chat-box" id="chatBox">
            <div class="msg ai">Hello! I see live updates from your MPPT controller. Ask me anything about your microgrid system performance.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask AI about your microgrid power production..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Adjust this URL to point to your Flask server's IP address
        const BACKEND_URL = "http://localhost:5000";

        // Fetch Live telemetry every 3 seconds
        async function fetchTelemetry() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/dashboard`);
                const data = await response.json();
                
                document.getElementById('volt').innerText = data.voltage + " V";
                document.getElementById('curr').innerText = data.current + " A";
                document.getElementById('power').innerText = data.power + " W";
                document.getElementById('status').innerText = data.battery_status;
            } catch (err) {
                console.error("Failed to connect to Flask backend:", err);
                document.getElementById('status').innerText = "Offline";
            }
        }

        // Send message to local Ollama via backend
        async function sendMessage() {
            const inputEl = document.getElementById('userInput');
            const message = inputEl.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            inputEl.value = '';

            // Add placeholder loading message for AI
            const loadingId = appendMessage("AI is thinking...", 'ai');

            try {
                const response = await fetch(`${BACKEND_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                
                // Replace placeholder text with real answer
                document.getElementById(loadingId).innerText = data.reply;
            } catch (err) {
                document.getElementById(loadingId).innerText = "Error: Couldn't reach backend.";
            }
        }

        function appendMessage(text, sender) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            const id = 'msg-' + Date.now();
            msgDiv.id = id;
            msgDiv.className = `msg ${sender}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        // Poll for updates
        setInterval(fetchTelemetry, 3000);
        fetchTelemetry();
    </script>
</body>
</html>
