<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Telemetry & AI Dashboard</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media(max-width: 768px) { .container { grid-template-columns: 1fr; } }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .metric { background: #f8f9fa; padding: 15px; border-radius: 6px; text-align: center; }
        .metric div { font-size: 0.9rem; color: #666; text-transform: uppercase; }
        .metric span { font-size: 1.6rem; font-weight: bold; color: #2ecc71; }
        #chat-box { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 6px; background: #fafafa; margin-bottom: 10px; }
        .chat-input-area { display: flex; gap: 10px; }
        #chat-input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2980b9; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 4px; max-width: 80%; }
        .user-msg { background: #e1ffc7; margin-left: auto; text-align: right; }
        .ai-msg { background: #e8ecef; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: #2c3e50;">Solar Management Center</h1>

    <div class="container">
        <!-- Telemetry Panel -->
        <div class="card">
            <h2>System Telemetry</h2>
            <div class="metric-grid">
                <div class="metric"><div>Battery Voltage</div><span id="v-bat">0.00</span> V</div>
                <div class="metric"><div>DC Load Power</div><span id="p-dc">0.00</span> W</div>
                <div class="metric"><div>AC Grid Voltage</div><span id="v-ac">0.00</span> V</div>
                <div class="metric"><div>AC Consumption</div><span id="p-ac">0.00</span> W</div>
            </div>
            <p style="text-align: right; font-size: 0.8rem; color: #999;">Total energy used: <span id="e-ac">0</span> kWh</p>
        </div>

        <!-- AI Assistant Panel -->
        <div class="card">
            <h2>AI Assistant (Ollama)</h2>
            <div id="chat-box"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask about system health or metrics...">
                <button onclick="sendMessage()">Ask AI</button>
            </div>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR FLASK SERVER PUBLIC OR PRIVATE IP ADDRESS
        const LOCAL_API_URL = "http://localhost:5000/api";

        // Fetch metrics from backend
        async function fetchMetrics() {
            try {
                const res = await fetch(`${LOCAL_API_URL}/status`);
                const data = await res.json();
                
                document.getElementById('v-bat').innerText = data.battery_voltage.toFixed(2);
                document.getElementById('p-dc').innerText = (data.dc_power_mw / 1000).toFixed(2);
                document.getElementById('v-ac').innerText = data.ac_voltage.toFixed(1);
                document.getElementById('p-ac').innerText = data.ac_power.toFixed(1);
                document.getElementById('e-ac').innerText = data.ac_energy.toFixed(2);
            } catch (err) {
                console.error("Error fetching telemetry:", err);
            }
        }

        // Send chat message to local AI engine via backend
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            const message = input.value.trim();
            if (!message) return;

            // Render user message
            chatBox.innerHTML += `<div class="msg user-msg">${message}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch(`${LOCAL_API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await res.json();
                
                // Render AI response
                chatBox.innerHTML += `<div class="msg ai-msg">${data.reply}</div>`;
            } catch (err) {
                chatBox.innerHTML += `<div class="msg ai-msg" style="color:red;">Error connecting to backend assistant.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Poll telemetry every 3 seconds
        setInterval(fetchMetrics, 3000);
        fetchMetrics();
    </script>
</body>
</html>
