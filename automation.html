<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microgrid Automation (Showcase Demo)</title>
    <style>
        :root { 
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --accent: #22c55e; 
            --text: #f8fafc; 
        }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        h1 { color: #eab308; text-align: center; margin-bottom: 5px; }
        .demo-badge {
            background: #eab308;
            color: #0f172a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .nav-btn { 
            display: inline-block; 
            background: #475569; 
            color: white; 
            padding: 10px 20px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-bottom: 25px; 
            transition: background 0.2s;
        }
        .nav-btn:hover { background: #334155; }
        .panel { 
            width: 100%; 
            max-width: 500px; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 1px solid #334155; 
        }
        .row:last-child { border-bottom: none; }
        .label-group { display: flex; flex-direction: column; }
        .label { font-size: 1.1rem; font-weight: 500; }
        .sub-label { font-size: 0.85rem; color: #94a3b8; margin-top: 2px; }
        
        /* Modern Toggle Switch Design */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #64748b;
            transition: .3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--accent);
            box-shadow: 0 0 10px rgba(34,197,94,0.4);
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .status-text {
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 4px;
            text-align: right;
            color: #64748b;
            transition: color 0.2s;
        }
        input:checked ~ .status-text {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <h1>Microgrid Smart Automation</h1>
    <div class="demo-badge">Interactive UI Showcase</div>
    
    <a href="index.html" class="nav-btn">← Back to Dashboard Overview</a>

    <div class="panel">
        <!-- Switch 1 -->
        <div class="row">
            <div class="label-group">
                <span class="label">Living Room Lights</span>
                <span class="sub-label">Zone 1 • Smart Relay</span>
            </div>
            <div>
                <label class="switch">
                    <input type="checkbox" id="lightSwitch" onchange="toggleDemoState('lightSwitch', 'lightStatus')">
                    <span class="slider"></span>
                </label>
                <div id="lightStatus" class="status-text">DISCONNECTED</div>
            </div>
        </div>

        <!-- Switch 2 -->
        <div class="row">
            <div class="label-group">
                <span class="label">Kitchen HVAC Fan</span>
                <span class="sub-label">Zone 2 • Heavy Load</span>
            </div>
            <div>
                <label class="switch">
                    <input type="checkbox" id="fanSwitch" onchange="toggleDemoState('fanSwitch', 'fanStatus')">
                    <span class="slider"></span>
                </label>
                <div id="fanStatus" class="status-text">DISCONNECTED</div>
            </div>
        </div>

        <!-- Switch 3 -->
        <div class="row">
            <div class="label-group">
                <span class="label">Master Bedroom AC</span>
                <span class="sub-label">Zone 3 • Climate Control</span>
            </div>
            <div>
                <label class="switch">
                    <input type="checkbox" id="acSwitch" onchange="toggleDemoState('acSwitch', 'acStatus')">
                    <span class="slider"></span>
                </label>
                <div id="acStatus" class="status-text">DISCONNECTED</div>
            </div>
        </div>
        
        <!-- Switch 4 -->
        <div class="row">
            <div class="label-group">
                <span class="label">Water Heating Pump</span>
                <span class="sub-label">Zone 4 • Automated Schedule</span>
            </div>
            <div>
                <label class="switch">
                    <input type="checkbox" id="pumpSwitch" onchange="toggleDemoState('pumpSwitch', 'pumpStatus')">
                    <span class="slider"></span>
                </label>
                <div id="pumpStatus" class="status-text">DISCONNECTED</div>
            </div>
        </div>
    </div>

    <script>
        // Completely offline/frontend simulation function
        function toggleDemoState(checkboxId, statusId) {
            const checkbox = document.getElementById(checkboxId);
            const statusText = document.getElementById(statusId);
            
            if (checkbox.checked) {
                statusText.innerText = "ACTIVE / ON";
            } else {
                statusText.innerText = "DISCONNECTED";
            }
        }
    </script>
</body>
</html>
