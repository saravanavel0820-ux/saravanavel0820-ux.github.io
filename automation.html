<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microgrid Automation</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent: #a855f7; --text: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg-color); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #eab308; }
        nav { display: flex; gap: 15px; margin-bottom: 30px; }
        nav a { color: #94a3b8; text-decoration: none; padding: 8px 16px; background: #1e293b; border-radius: 6px; font-weight: 500; }
        nav a:nth-child(1) { color: #94a3b8; }
        nav a:nth-child(2) { background: #eab308; color: #0f172a; }
        .control-panel { width: 100%; max-width: 600px; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .switch-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #334155; }
        .switch-row:last-child { border-bottom: none; }
        .switch-label { font-size: 1.2rem; font-weight: 500; }
        .toggle-btn { padding: 10px 20px; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-off { background: #475569; color: #cbd5e1; }
        .btn-on { background: #22c55e; color: white; box-shadow: 0 0 10px rgba(34,197,94,0.4); }
    </style>
</head>
<body>

    <h1>Microgrid Control Automation</h1>
    
    <nav>
        <a href="/">Template Dashboard</a>
        <a href="/automation">Automation System</a>
        <a href="/consumption">Power Consumption</a>
    </nav>

    <div class="control-panel">
        <div class="switch-row">
            <span class="switch-label">Living Room Main Light</span>
            <button id="living_room_light" class="toggle-btn btn-off" onclick="toggleRelay('living_room_light')">OFF</button>
        </div>
        <div class="switch-row">
            <span class="switch-label">Kitchen Exhaust Fan</span>
            <button id="kitchen_fan" class="toggle-btn btn-off" onclick="toggleRelay('kitchen_fan')">OFF</button>
        </div>
        <div class="switch-row">
            <span class="switch-label">Master Bedroom AC Unit</span>
            <button id="bedroom_ac" class="toggle-btn btn-off" onclick="toggleRelay('bedroom_ac')">OFF</button>
        </div>
        <div class="switch-row">
            <span class="switch-label">Outdoor Perimeter Security Light</span>
            <button id="outdoor_security" class="toggle-btn btn-off" onclick="toggleRelay('outdoor_security')">OFF</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = window.location.origin;

        async function updateSwitchUI() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/automation/switches`);
                const states = await response.json();
                
                for (const [key, value] of Object.entries(states)) {
                    const btn = document.getElementById(key);
                    if (btn) {
                        btn.innerText = value ? "ON" : "OFF";
                        btn.className = `toggle-btn ${value ? 'btn-on' : 'btn-off'}`;
                    }
                }
            } catch (err) { console.error("Error refreshing switch positions:", err); }
        }

        async function toggleRelay(switchId) {
            try {
                await fetch(`${BACKEND_URL}/api/automation/toggle`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ switch_id: switchId })
                });
                updateSwitchUI();
            } catch (err) { console.error("Failed to execute relay switch toggle action:", err); }
        }

        // Keep page synchronized with live database changes
        setInterval(updateSwitchUI, 2000);
        updateSwitchUI();
    </script>
</body>
</html>
