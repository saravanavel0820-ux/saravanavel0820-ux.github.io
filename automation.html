<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Automation | IoT Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0f19;
            --text-color: #f8fafc;
            --card-bg: rgba(23, 31, 51, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(135deg, #3b82f6, #9333ea, #e11d48);
            --primary-accent: #3b82f6;
            --subtext-color: #94a3b8;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-heading: 'Space Grotesk', sans-serif;
            --nav-bg: rgba(11, 15, 25, 0.85);
        }

        body {
            padding-top: 90px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            min-height: 100vh;
        }

        h1, h2, h3, .nav-link { font-family: var(--font-heading); }

        .custom-navbar {
            background: var(--nav-bg);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--card-border);
            padding: 15px 0;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
        }

        .text-gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        .control-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg custom-navbar fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-gradient fs-3" href="index.html">
                <i class="fa-solid fa-microchip me-2"></i>IoT Hub
            </a>
            
            <div class="ms-auto d-flex align-items-center gap-3">
                <span id="userNameDisplay" class="small fw-semibold text-primary"></span>
                <button class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="handleLogout()">
                    <i class="fa-solid fa-right-from-bracket me-1"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="glass-card mb-4">
            <h2 class="fw-bold text-gradient mb-2"><i class="fa-solid fa-sliders me-2"></i>Home Automation Panel</h2>
            <p class="text-muted mb-0">Control relays and connected hardware in real time.</p>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="control-card">
                    <i class="fa-solid fa-lightbulb fa-3x text-warning mb-3"></i>
                    <h4>Main Light</h4>
                    <button class="btn btn-primary rounded-pill px-4 mt-2" onclick="alert('Relay 1 Toggled!')">Toggle Power</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="control-card">
                    <i class="fa-solid fa-fan fa-3x text-info mb-3"></i>
                    <h4>Fan Relay</h4>
                    <button class="btn btn-info text-white rounded-pill px-4 mt-2" onclick="alert('Relay 2 Toggled!')">Toggle Power</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="control-card">
                    <i class="fa-solid fa-plug fa-3x text-danger mb-3"></i>
                    <h4>Smart Plug</h4>
                    <button class="btn btn-danger rounded-pill px-4 mt-2" onclick="alert('Relay 3 Toggled!')">Toggle Power</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB-EXAMPLE_API_KEY_HERESx9234",
            authDomain: "saravanavel0820-ux.firebaseapp.com",
            projectId: "saravanavel0820-ux",
            storageBucket: "saravanavel0820-ux.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef123456"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        // --- AUTHENTICATION GUARD ---
        auth.onAuthStateChanged((user) => {
            if (!user) {
                // If not logged in, force redirect to login page
                window.location.href = 'auth.html';
            } else {
                // Display user's name or email
                document.getElementById('userNameDisplay').innerText = `Logged in: ${user.displayName || user.email}`;
            }
        });

        // --- LOGOUT HANDLER ---
        function handleLogout() {
            auth.signOut().then(() => {
                window.location.href = 'auth.html';
            });
        }
    </script>
</body>
</html>
