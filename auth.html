<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Portal | IoT Automation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-color: #f8fafc;
            --card-bg: rgba(23, 31, 51, 0.75);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-gradient: linear-gradient(135deg, #3b82f6, #9333ea, #e11d48);
            --primary-accent: #3b82f6;
            --subtext-color: #94a3b8;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-heading: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(147, 51, 234, 0.15) 0%, transparent 40%);
        }

        h1, h2, h3, .nav-tab-btn { font-family: var(--font-heading); }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .text-gradient {
            background: var(--accent-gradient);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        .custom-input {
            background: rgba(11, 15, 25, 0.6);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            border-radius: 14px;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }

        .custom-input:focus {
            background: rgba(11, 15, 25, 0.8);
            border-color: var(--primary-accent);
            color: var(--text-color);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            outline: none;
        }

        .input-group-text {
            background: rgba(11, 15, 25, 0.6);
            border: 1px solid var(--card-border);
            color: var(--subtext-color);
            border-radius: 14px 0 0 14px;
        }

        .input-group .custom-input {
            border-radius: 0 14px 14px 0;
        }

        .input-group .password-toggle {
            border-radius: 0 14px 14px 0;
            cursor: pointer;
        }

        .tab-switcher {
            background: rgba(11, 15, 25, 0.6);
            padding: 5px;
            border-radius: 50px;
            border: 1px solid var(--card-border);
            display: flex;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--subtext-color);
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-submit {
            background: var(--accent-gradient);
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px;
            border-radius: 14px;
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            color: white;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="auth-card text-center">
        <a href="index.html" class="text-decoration-none">
            <h2 class="fw-bold text-gradient mb-1"><i class="fa-solid fa-microchip me-2"></i>IoT Hub</h2>
        </a>
        <p class="small text-muted mb-4">Automation Control Panel Access</p>

        <div class="tab-switcher">
            <button class="tab-btn active" id="loginTabBtn" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" id="signupTabBtn" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div id="alertBox" class="alert alert-danger d-none py-2 px-3 rounded-3 small mb-3" role="alert"></div>

        <div id="loginForm" class="form-section active text-start">
            <form onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label class="form-label small text-muted">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="loginEmail" class="form-control custom-input" placeholder="name@domain.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small text-muted">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="loginPassword" class="form-control custom-input" placeholder="••••••••" required>
                        <span class="input-group-text password-toggle" onclick="togglePasswordVisibility('loginPassword', this)">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit mb-3" id="loginSubmitBtn">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Login to Dashboard
                </button>
            </form>
        </div>

        <div id="signupForm" class="form-section text-start">
            <form onsubmit="handleSignUp(event)">
                <div class="mb-3">
                    <label class="form-label small text-muted">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                        <input type="text" id="signUpName" class="form-control custom-input" placeholder="Saravana Vel" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small text-muted">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="signUpEmail" class="form-control custom-input" placeholder="name@domain.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small text-muted">Password (at least 6 characters)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                        <input type="password" id="signUpPassword" class="form-control custom-input" placeholder="••••••••" required minlength="6">
                        <span class="input-group-text password-toggle" onclick="togglePasswordVisibility('signUpPassword', this)">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit mb-3" id="signupSubmitBtn">
                    <i class="fa-solid fa-user-plus me-2"></i>Create Account
                </button>
            </form>
        </div>

        <a href="index.html" class="text-muted small text-decoration-none">
            <i class="fa-solid fa-arrow-left me-1"></i> Return to Home
        </a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyB-EXAMPLE_API_KEY_HERESx9234",
            authDomain: "saravanavel0820-ux.firebaseapp.com",
            projectId: "saravanavel0820-ux",
            storageBucket: "saravanavel0820-ux.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef123456"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        // Check if user is already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'automation.html';
            }
        });

        // Tab Switcher
        function switchTab(type) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginTabBtn = document.getElementById('loginTabBtn');
            const signupTabBtn = document.getElementById('signupTabBtn');
            const alertBox = document.getElementById('alertBox');

            alertBox.classList.add('d-none');

            if (type === 'login') {
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                loginTabBtn.classList.add('active');
                signupTabBtn.classList.remove('active');
            } else {
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
                signupTabBtn.classList.add('active');
                loginTabBtn.classList.remove('active');
            }
        }

        function togglePasswordVisibility(inputId, element) {
            const input = document.getElementById(inputId);
            const icon = element.querySelector('i');
            if (input.type === "password") {
                input.type = "text";
                icon.className = "fa-solid fa-eye-slash";
            } else {
                input.type = "password";
                icon.className = "fa-solid fa-eye";
            }
        }

        function showAlert(msg, isSuccess = false) {
            const alertBox = document.getElementById('alertBox');
            alertBox.classList.remove('d-none', 'alert-danger', 'alert-success');
            alertBox.classList.add(isSuccess ? 'alert-success' : 'alert-danger');
            alertBox.innerText = msg;
        }

        // --- Handle Sign Up with Firebase ---
        function handleSignUp(e) {
            e.preventDefault();
            const name = document.getElementById('signUpName').value;
            const email = document.getElementById('signUpEmail').value;
            const password = document.getElementById('signUpPassword').value;

            document.getElementById('signupSubmitBtn').innerText = "Creating Account...";

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    return userCredential.user.updateProfile({
                        displayName: name
                    });
                })
                .then(() => {
                    showAlert('Account created successfully! Redirecting...', true);
                    setTimeout(() => {
                        window.location.href = 'automation.html';
                    }, 1000);
                })
                .catch((error) => {
                    showAlert(error.message);
                    document.getElementById('signupSubmitBtn').innerText = "Create Account";
                });
        }

        // --- Handle Login with Firebase ---
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            document.getElementById('loginSubmitBtn').innerText = "Authenticating...";

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    showAlert('Login successful! Redirecting...', true);
                    setTimeout(() => {
                        window.location.href = 'automation.html';
                    }, 800);
                })
                .catch((error) => {
                    showAlert(error.message);
                    document.getElementById('loginSubmitBtn').innerText = "Login to Dashboard";
                });
        }
    </script>
</body>
</html>
