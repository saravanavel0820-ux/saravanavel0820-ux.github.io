<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Connect Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>body { padding-top: 70px; background-color: #f8f9fa; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-microchip me-2"></i>IoT Hub</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="esp32.html">ESP32 Connect</a></li>
                    <li class="nav-item"><a class="nav-link" href="automation.html">Automation</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-4"><i class="fa-solid fa-wifi me-2 text-primary"></i>ESP32 Live Dashboard</h2>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm border-start border-primary border-4">
                    <h6>Temperature</h6>
                    <h3 id="tempVal">28 °C</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 shadow-sm border-start border-info border-4">
                    <h6>Humidity</h6>
                    <h3 id="humidityVal">65 %</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 shadow-sm border-start border-success border-4">
                    <h6>Connection Status</h6>
                    <h3 class="text-success">Online</h3>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
